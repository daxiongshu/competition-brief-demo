    if (role === "thinking") {
      div.className = "msg think";
      const { extra } = splitPacked(text);
      const details = document.createElement("details");
      details.className = "think-card";
      details.innerHTML = `<summary>Thinking...</summary><pre></pre>`;
      details.querySelector("pre").textContent = extra;
      div.appendChild(details);
      return div;
    }

    if (role === "system" && text.startsWith("[tool: ")) {
      div.className = "msg system";
      const { main, extra, resultText } = splitPacked(text);
      const nameMatch = main.match(/^\[tool: ([^\]]+)\]\s?(.*)$/s);
      const toolName = nameMatch ? nameMatch[1] : "tool";
      const summary = nameMatch ? nameMatch[2] : main;
      const details = document.createElement("details");
      details.className = "tool-card";
      const sum = document.createElement("summary");
      sum.innerHTML = `<span class="tool-name">${escapeHtml(toolName)}</span><span>${escapeHtml(summary)}</span>`;
      details.appendChild(sum);
      if (extra) {
        let pretty = extra;
        try { pretty = JSON.stringify(JSON.parse(extra), null, 2); } catch {}
        const pre = document.createElement("pre");
        pre.textContent = pretty;
        details.appendChild(pre);
      }
      if (resultText) {
        const pre = document.createElement("pre");
        pre.style.color = "var(--text-primary)";
        pre.textContent = resultText.length > 4000 ? resultText.slice(0, 4000) + "\n… (truncated)" : resultText;
        details.appendChild(pre);
      }
      div.appendChild(details);
      return div;
    }

    if (role === "system") {
      div.className = "msg system";
      div.textContent = text;
      return div;
    }

    const isUserAgent = role === "user" && m.source === "user-agent";
    div.className = `msg ${role === "assistant" ? "assistant" : "user"}${isUserAgent ? " user-agent-msg" : ""}`;

    if (isUserAgent) {
      const label = document.createElement("div");
      label.className = "msg-label";
      label.textContent = "Claude User Agent" + (m.uaRole ? ` — ${m.uaRole}` : "");
      div.appendChild(label);
    }

    if (Array.isArray(m.imageDataUrls)) {
      for (const url of m.imageDataUrls) {
        const img = document.createElement("img");
        img.className = "chat-img";
        img.src = url;
        img.style.marginBottom = "8px";
        div.appendChild(img);
      }
    }

    const body = document.createElement("div");
    if (role === "assistant") body.innerHTML = marked.parse(text);
    else body.textContent = text;
    div.appendChild(body);

    const timer = document.createElement("div");
    timer.className = "msg-timer";
    const parts = [formatTimestamp(m.ts)];
    if (m.model) parts.push(m.model);
    timer.textContent = parts.filter(Boolean).join(" · ");
    if (timer.textContent) div.appendChild(timer);

    return div;
  }

  function renderTranscript(entity) {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";
    const messages = (entity && entity.messages) || [];
    if (messages.length === 0) {
      chat.innerHTML = '<div id="empty-state">No messages.</div>';
      return;
    }
    for (const m of messages) chat.appendChild(createMsgDiv(m));
    chat.scrollTop = 0;
  }

  function setActiveNav(el) {
    document.querySelectorAll(".nav-item").forEach((n) => n.classList.remove("active"));
    if (el) el.classList.add("active");
  }

  function selectMain(session) {
    document.getElementById("main-title").textContent = session.title || "Session";
    document.getElementById("main-sub").textContent = [session.backend, session.cwd].filter(Boolean).join("  ·  ");
    renderTranscript(session);
  }

  function selectSubagent(sub) {
    document.getElementById("main-title").textContent = sub.title || sub.agentType || "Subagent";
    document.getElementById("main-sub").textContent = [sub.agentType, sub.backend].filter(Boolean).join("  ·  ");
    renderTranscript(sub);
  }

  function init() {
    let data;
    try {
      data = JSON.parse(document.getElementById("session-export-data").textContent);
    } catch (e) {
      document.getElementById("chat").textContent = "Failed to parse embedded session data.";
      return;
    }
    const session = data.session || { title: "(no data)", messages: [] };
    const subagents = Array.isArray(data.subagents) ? data.subagents : [];

    document.title = "Viewer: " + (session.title || "Session");
    document.getElementById("sidebar-title").textContent = session.title || "Session";
    document.getElementById("sidebar-meta").textContent = [session.backend, session.cwd].filter(Boolean).join(" · ");

    const nav = document.getElementById("nav-list");
    nav.innerHTML = "";

    const mainItem = document.createElement("div");
    mainItem.className = "nav-item active";
    mainItem.innerHTML = `<div class="nav-title">💬 Main session</div><div class="nav-sub">${session.messages.length} messages</div>`;
    mainItem.addEventListener("click", () => { setActiveNav(mainItem); selectMain(session); });
    nav.appendChild(mainItem);

    if (subagents.length > 0) {
      const label = document.createElement("div");
      label.className = "nav-section-label";
      label.textContent = `${subagents.length} subagent${subagents.length === 1 ? "" : "s"}`;
      nav.appendChild(label);

      for (const sub of subagents) {
        const item = document.createElement("div");
        item.className = "nav-item";
        item.innerHTML = `<div class="nav-title">${escapeHtml(sub.title || sub.agentType || sub.id)}</div><div class="nav-sub">${escapeHtml(sub.agentType || "")} · ${(sub.messages || []).length} messages</div>`;
        item.addEventListener("click", () => { setActiveNav(item); selectSubagent(sub); });
        nav.appendChild(item);
      }
    }

    selectMain(session);
  }

  init();
  </script>
</body>
</html>
